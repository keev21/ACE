<ion-content>
  <ion-searchbar class="searchbar-spacing" color="medium" [(ngModel)]="searchTerm" (ionInput)="filterProductos($event)"
    placeholder="Buscar producto"></ion-searchbar>

  <ion-button color="tertiary" routerLink="/inventarioregistro" class="floating-button button-spacing">
    <ion-icon color="dark" name="duplicate-outline" class="icon-space"></ion-icon>
    <strong>Registrar Inventario</strong>
  </ion-button>

  <ion-grid class="transparent-grid custom-table">
    <!-- Fila para la fecha actual -->
    <ion-row>
      <ion-col class="header col-label" color="light">Fecha</ion-col>
      <ion-col class="data col-value">
        {{ currentDate }}
      </ion-col>
    </ion-row>
    <br>

    <!-- Fila para el producto -->
    <ion-row class="header-row">
      <ion-col class="header col-label" color="light">Producto</ion-col>
      <ion-col class="data col-value">
        Nombre del Producto <!-- Placeholder -->
        <ion-button size="small" fill="clear" color="primary" (click)="toggleProductInfo()">
          <ion-icon slot="icon-only" [name]="showProductInfo ? 'chevron-up-outline' : 'chevron-down-outline'"></ion-icon>
        </ion-button>
      </ion-col>
    </ion-row>

    <!-- Mostrar información del producto y opciones si showProductInfo es true -->
    <ion-row *ngIf="showProductInfo">
      <ion-col class="header col-label" color="light">Cantidad</ion-col>
      <ion-col class="data col-value">Cantidad Inicial</ion-col> <!-- Placeholder -->
    </ion-row>

    <ion-row *ngIf="showProductInfo">
      <ion-col class="header col-label" color="light">Precio</ion-col>
      <ion-col class="data col-value">Precio</ion-col> <!-- Placeholder -->
    </ion-row>

    <ion-row *ngIf="showProductInfo">
      <ion-col class="header col-label" color="light">Ganancia</ion-col>
      <ion-col class="data col-value">Ganancia</ion-col> <!-- Placeholder -->
    </ion-row>

    <ion-row *ngIf="showProductInfo">
      <ion-col class="header col-label" color="light">Pérdida</ion-col>
      <ion-col class="data col-value">Pérdida</ion-col> <!-- Placeholder -->
    </ion-row>

    <ion-row *ngIf="showProductInfo">
      <ion-col class="header col-label" color="light">Opciones</ion-col>
      <ion-col class="data col-value">
        <div class="action-buttons">
          <ion-button size="small" fill="clear" color="tertiary" (click)="editarProducto('codigo-placeholder')">
            <ion-icon slot="icon-only" name="create-outline"></ion-icon>
          </ion-button>
          <ion-button size="small" fill="clear" color="danger" (click)="eliminarProducto('codigo-placeholder')">
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-button>
          <ion-button size="small" fill="clear" color="primary" (click)="actualizarProducto('codigo-placeholder')">
            <ion-icon slot="icon-only" name="sync-outline"></ion-icon>
          </ion-button>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
